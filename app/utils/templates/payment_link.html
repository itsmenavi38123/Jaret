<!DOCTYPE html>
<html>

<body style="margin:0;padding:0;background-color:#f4f5f6;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
        style="background-color:#f4f5f6;padding:48px 0;font-family:'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
        <tr>
            <td align="center">
                <table role="presentation" width="560" cellpadding="0" cellspacing="0"
                    style="background-color:#064A63;background:linear-gradient(135deg, #054E66 0%, #087396 100%);border-radius:24px;border:1px solid rgba(255,255,255,0.15);padding:40px 48px;color:#FFFFFF;text-align:left;box-shadow:0 12px 30px rgba(6,74,99,0.18);">
                    <tr>
                        <td>
                            <!-- Header / Logo -->
                            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 32px;">
                                <tr>
                                    <td style="width:36px;vertical-align:middle;">
                                        <img src="https://lightsignal.app/ls-logo.png" width="36" height="36" alt="LS"
                                            style="display:block;width:36px;height:36px;border:0;">
                                    </td>
                                    <td
                                        style="padding-left:12px;vertical-align:middle;font-weight:bold;font-size:20px;color:#FFFFFF;letter-spacing:-0.02em;">
                                        LightSignal
                                    </td>
                                </tr>
                            </table>

                            <!-- Body Text -->
                            <p style="margin:0 0 20px;font-size:16px;line-height:1.65;color:#FFFFFF;font-weight:500;">
                                Hello {first_name},
                            </p>
                            <p style="margin:0 0 20px;font-size:15px;line-height:1.65;color:#CFEFFB;">
                                Your subscription is ready. Please click the button below to complete your payment and
                                continue using LightSignal.
                            </p>

                            <!-- Call to Action -->
                            <p style="margin:24px 0 28px;">
                                <a href="{checkout_url}" style="display:inline-block;padding:12px 24px;
                                          background:#5FE0FF;color:#04303F;
                                          text-decoration:none;border-radius:999px;font-weight:bold;font-size:15px;
                                          box-shadow:0 8px 20px -6px rgba(95,224,255,0.4);
                                          transition:transform 140ms ease-out;">
                                    Pay and Continue
                                </a>
                            </p>

                            <p style="margin:0 0 32px;font-size:14px;line-height:1.65;color:#A7DCF0;">
                                This link will expire in 24 hours.
                            </p>

                            <!-- Signature -->
                            <p style="margin:0;font-size:15px;font-weight:bold;color:#5FE0FF;">
                                LightSignal
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
